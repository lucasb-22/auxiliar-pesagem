<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fazenda Eunice - Pesagem</title>
    <style>
        :root {
            --primary: #002366;
            --white: #ffffff;
            --bg: #f4f7f9;
            --success: #28a745;
            --danger: #dc3545;
            --gray: #6c757d;
            --light-gray: #e9ecef;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--primary); overflow-x: hidden; }

        /* Header */
        .header { background-color: var(--primary); color: var(--white); padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 16px; font-weight: bold; opacity: 0.9; }

        /* Navegação */
        .nav { display: flex; background-color: #001540; padding: 10px; gap: 10px; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: transparent; color: rgba(255,255,255,0.6); border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background-color: var(--white); color: var(--primary); }

        /* Container Principal */
        .content { padding: 20px; display: none; }
        .content.active { display: block; }

        /* Barra de Estatísticas */
        .stats-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: var(--white); padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid var(--primary); }
        .stat-box span { display: block; font-size: 14px; color: var(--gray); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box strong { font-size: 24px; color: var(--primary); }

        /* Inputs de Pesagem */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 20px; font-size: 36px; border: 3px solid var(--primary); border-radius: 12px; text-align: center; font-weight: bold; color: var(--primary); }
        .input-group input:focus { outline: none; border-color: var(--success); box-shadow: 0 0 10px rgba(40, 167, 69, 0.3); }

        /* Grid de Lotes */
        .grid-lotes { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .btn-lote { background-color: var(--primary); color: var(--white); border: none; padding: 35px 15px; font-size: 24px; font-weight: bold; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.1s; }
        .btn-lote:active { transform: scale(0.95); background-color: var(--success); }

        /* Aba Arquivos */
        .card-arquivo { background: var(--white); padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid transparent; transition: 0.3s; }
        .card-arquivo.disabled { background: var(--light-gray); opacity: 0.6; border-color: #ccc; }
        .card-arquivo input[type="text"] { font-size: 20px; padding: 10px; border: 2px solid #ccc; border-radius: 8px; width: 60%; font-weight: bold; color: var(--primary); }
        
        /* Toggle Switch */
        .switch-container { display: flex; align-items: center; gap: 10px; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn-add { background: var(--success); color: white; width: 100%; padding: 20px; font-size: 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* Aba Sessões */
        .sessoes-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-export { background: var(--success); color: white; flex: 1; padding: 15px; font-size: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-clear { background: var(--danger); color: white; flex: 1; padding: 15px; font-size: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-size: 16px; }
        th { background: var(--primary); color: white; font-weight: bold; }
        .btn-edit { background: #ffc107; color: #000; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 2px; }
        .btn-edit-lote { background: #17a2b8; color: #000; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Fazenda Eunice</h1>
        <p id="data-topo"></p>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="mudarAba('pesagem')">PESAGEM</button>
        <button class="nav-btn" onclick="mudarAba('sessoes')">SESSÕES</button>
        <button class="nav-btn" onclick="mudarAba('arquivos')">ARQUIVOS</button>
    </div>

    <!-- ABA PESAGEM -->
    <div id="aba-pesagem" class="content active">
        <div class="stats-bar">
            <div class="stat-box"><span>Animais</span><strong id="stat-count">0</strong></div>
            <div class="stat-box"><span>Média (kg)</span><strong id="stat-avg">0.0</strong></div>
            <div class="stat-box"><span>Último (kg)</span><strong id="stat-last">0.0</strong></div>
        </div>

        <div class="input-group">
            <label>Peso (kg)</label>
            <input type="number" id="input-peso" placeholder="0.0" step="0.1" inputmode="decimal">
        </div>

        <div class="input-group">
            <label>Brinco (ID)</label>
            <input type="number" id="input-brinco" placeholder="Digite o brinco" inputmode="numeric" oninput="if(this.value.length > 6) this.value = this.value.slice(0,6);">
        </div>

        <h3 style="margin-top: 20px; margin-bottom: 10px;">Selecione o Lote para Salvar:</h3>
        <div class="grid-lotes" id="grid-lotes">
            <!-- Botões de lotes gerados via JS -->
        </div>
    </div>

    <!-- ABA SESSÕES -->
    <div id="aba-sessoes" class="content">
        <div class="sessoes-actions">
            <button class="btn-export" onclick="exportarCSV()">📥 Exportar CSV</button>
            <button class="btn-clear" onclick="limparSessao()">🗑️ Limpar Sessão</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Brinco</th>
                        <th>Peso</th>
                        <th>Lote</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-registros">
                    <!-- Registros gerados via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- ABA ARQUIVOS -->
    <div id="aba-arquivos" class="content">
        <div id="lista-arquivos">
            <!-- Arquivos gerados via JS -->
        </div>
        <button class="btn-add" onclick="adicionarLote()">+ NOVO LOTE</button>
    </div>

    <script>
        // Inicialização de Dados
        let registros = JSON.parse(localStorage.getItem('eunice_registros')) || [];
        let lotes = JSON.parse(localStorage.getItem('eunice_lotes')) || [
            { id: 1, nome: 'Lote 01', ativo: true },
            { id: 2, nome: 'Lote 02', ativo: true }
        ];

        // Configurar Data no Topo
        const opcoesData = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('data-topo').innerText = new Date().toLocaleDateString('pt-BR', opcoesData).toUpperCase();

        // Navegação de Abas
        function mudarAba(aba) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('aba-' + aba).classList.add('active');

            if(aba === 'pesagem') { renderPesagem(); atualizarStats(); document.getElementById('input-peso').focus(); }
            if(aba === 'sessoes') renderSessoes();
            if(aba === 'arquivos') renderArquivos();
        }

        // ==================== LÓGICA DE PESAGEM ====================
        function atualizarStats() {
            const count = registros.length;
            const soma = registros.reduce((acc, curr) => acc + parseFloat(curr.peso), 0);
            const media = count > 0 ? (soma / count).toFixed(1) : "0.0";
            const ultimo = count > 0 ? registros[count - 1].peso : "0.0";

            document.getElementById('stat-count').innerText = count;
            document.getElementById('stat-avg').innerText = media;
            document.getElementById('stat-last').innerText = ultimo;
        }

        function renderPesagem() {
            const grid = document.getElementById('grid-lotes');
            grid.innerHTML = '';
            
            const lotesAtivos = lotes.filter(l => l.ativo).slice(0, 6);
            
            if (lotesAtivos.length === 0) {
                grid.innerHTML = '<p style="color: red; font-weight: bold;">Nenhum lote ativo. Vá na aba Arquivos e ative um lote.</p>';
                return;
            }

            lotesAtivos.forEach(lote => {
                const btn = document.createElement('button');
                btn.className = 'btn-lote';
                btn.innerText = lote.nome;
                btn.onclick = () => salvarPesagem(lote.nome);
                grid.appendChild(btn);
            });
        }

        function salvarPesagem(nomeLote) {
            const inputPeso = document.getElementById('input-peso');
            const inputBrinco = document.getElementById('input-brinco');
            
            const peso = inputPeso.value;
            const brinco = inputBrinco.value || 'S/ID';

            if (!peso || parseFloat(peso) &lt;= 0) {
                alert("Por favor, insira um peso válido!");
                inputPeso.focus();
                return;
            }

            const agora = new Date();
            const dataStr = agora.toLocaleDateString('pt-BR');
            const horaStr = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            registros.push({
                id: Date.now(),
                data: dataStr,
                hora: horaStr,
                brinco: brinco,
                peso: parseFloat(peso).toFixed(1),
                lote: nomeLote
            });

            localStorage.setItem('eunice_registros', JSON.stringify(registros));
            
            // Limpar e focar
            inputPeso.value = '';
            inputBrinco.value = '';
            inputPeso.focus();
            
            atualizarStats();
        }

        // ==================== LÓGICA DE SESSÕES ====================
        function renderSessoes() {
            const tbody = document.getElementById('tabela-registros');
            tbody.innerHTML = '';

            // Mostra do mais recente para o mais antigo
            const registrosInvertidos = [...registros].reverse();

            registrosInvertidos.forEach(reg => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${reg.hora}</td>
                    <td><strong>${reg.brinco}</strong></td>
                    <td>${reg.peso} kg</td>
                    <td>${reg.lote}</td>
                    <td>
                        <button class="btn-edit" onclick="editarDados(${reg.id})">✏️ Dados</button>
                        <button class="btn-edit-lote" onclick="editarNomeLote(${reg.id})">🏷️ Lote</button>
                        <button class="btn-delete" onclick="apagarRegistro(${reg.id})">X</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function editarDados(id) {
            const index = registros.findIndex(r => r.id === id);
            if (index === -1) return;

            const novoPeso = prompt("Editar Peso (kg):", registros[index].peso);
            if (novoPeso !== null && novoPeso.trim() !== "") {
                registros[index].peso = parseFloat(novoPeso).toFixed(1);
            }

            const novoBrinco = prompt("Editar Brinco:", registros[index].brinco);
            if (novoBrinco !== null) {
                registros[index].brinco = novoBrinco.trim() || 'S/ID';
            }

            localStorage.setItem('eunice_registros', JSON.stringify(registros));
            renderSessoes();
            atualizarStats();
        }

        function editarNomeLote(id) {
            const index = registros.findIndex(r => r.id === id);
            if (index === -1) return;

            const novoLote = prompt("Alterar o nome do Lote deste registro:", registros[index].lote);
            if (novoLote !== null && novoLote.trim() !== "") {
                registros[index].lote = novoLote.trim();
                localStorage.setItem('eunice_registros', JSON.stringify(registros));
                renderSessoes();
            }
        }

        function apagarRegistro(id) {
            if (confirm("Tem certeza que deseja apagar este registro?")) {
                registros = registros.filter(r => r.id !== id);
                localStorage.setItem('eunice_registros', JSON.stringify(registros));
                renderSessoes();
                atualizarStats();
            }
        }

        function exportarCSV() {
            if (registros.length === 0) {
                alert("Não há dados para exportar.");
                return;
            }

            let csv = "Data,Hora,Brinco,Peso(kg),Lote\n";
            registros.forEach(r => {
                csv += `${r.data},${r.hora},${r.brinco},${r.peso},${r.lote}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            const dataHoje = new Date().toISOString().split('T')[0];
            link.setAttribute("href", url);
            link.setAttribute("download", `Pesagem_Eunice_${dataHoje}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function limparSessao() {
            if (confirm("ATENÇÃO: Isso apagará TODOS os registros da sessão atual. Já exportou o CSV?")) {
                registros = [];
                localStorage.setItem('eunice_registros', JSON.stringify(registros));
                renderSessoes();
                atualizarStats();
            }
        }

        // ==================== LÓGICA DE ARQUIVOS (LOTES) ====================
        function renderArquivos() {
            const container = document.getElementById('lista-arquivos');
            container.innerHTML = '';

            lotes.forEach((lote, index) => {
                const div = document.createElement('div');
                div.className = `card-arquivo ${lote.ativo ? '' : 'disabled'}`;
                
                div.innerHTML = `
                    <input type="text" value="${lote.nome}" onchange="renomearLote(${index}, this.value)">
                    <div class="switch-container">
                        <label class="switch">
                            <input type="checkbox" ${lote.ativo ? 'checked' : ''} onchange="toggleLote(${index})">
                            <span class="slider"></span>
                        </label>
                        <button class="btn-delete" onclick="excluirLote(${index})">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function adicionarLote() {
            lotes.push({ id: Date.now(), nome: `Novo Lote ${lotes.length + 1}`, ativo: false });
            salvarLotes();
            renderArquivos();
        }

        function renomearLote(index, novoNome) {
            if (novoNome.trim() !== "") {
                lotes[index].nome = novoNome.trim();
                salvarLotes();
            }
        }

        function toggleLote(index) {
            const ativosAtuais = lotes.filter(l => l.ativo).length;
            
            // Se está tentando ativar e já tem 6, bloqueia
            if (!lotes[index].ativo && ativosAtuais >= 6) {
                alert("Você só pode ter no máximo 6 lotes ativos ao mesmo tempo na tela de pesagem.");
                renderArquivos(); // Re-renderiza para voltar o switch para off
                return;
            }

            lotes[index].ativo = !lotes[index].ativo;
            salvarLotes();
            renderArquivos();
        }

        function excluirLote(index) {
            if (confirm("Excluir este botão de lote? (Os registros salvos não serão perdidos)")) {
                lotes.splice(index, 1);
                salvarLotes();
                renderArquivos();
            }
        }

        function salvarLotes() {
            localStorage.setItem('eunice_lotes', JSON.stringify(lotes));
        }

        // Inicializar a tela principal
        renderPesagem();
        atualizarStats();

    </script>
</body>
</html>
